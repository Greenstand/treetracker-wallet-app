# This workflow is triggered on every pull request,that modify files in the BDD test suite or any of its dependencies (web, user, core, wallet packages).
# excluding changes to those files with the extensions .md, .yaml, and .yml

name: PR CI BDD e2e tests

on:
  pull_request_target:
    types:
      - opened
      - synchronize
      - reopened
      - edited
      - ready_for_review
    paths:
      - "apps/bdd/**"
      - "apps/web/**"
      - "apps/user/**"
      - "packages/core/**"
      - "packages/wallet/**"
      - "package.json"
      - "yarn.lock"
      - ".github/workflows/ci-cd-pr-bdd-wallet.yml"
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  full-bdd-e2e-tests:
    runs-on: ubuntu-latest
    if: github.event_name != 'pull_request_target' || github.event.pull_request.head.repo.full_name == github.repository
    env:
      NODE_TLS_REJECT_UNAUTHORIZED: "0"
      NEXT_PUBLIC_TREETRACKER_WALLET_API: ${{ vars.NEXT_PUBLIC_TREETRACKER_WALLET_API }}
      NEXT_PUBLIC_TREETRACKER_USER_API: ${{ vars.NEXT_PUBLIC_TREETRACKER_USER_API }}
      NEXT_PUBLIC_ENV: ${{ vars.NEXT_PUBLIC_ENV }}
      NEXT_PUBLIC_API_TIMEOUT: ${{ vars.NEXT_PUBLIC_API_TIMEOUT }}
      NEXT_PUBLIC_API_RETRIES: ${{ vars.NEXT_PUBLIC_API_RETRIES }}
      NEXT_PUBLIC_BASE_URL: ${{ vars.NEXT_PUBLIC_BASE_URL }}
      CORS_ORIGINS_DEV: ${{ vars.CORS_ORIGINS_DEV }}
      PRIVATE_KEYCLOAK_REALM: ${{ secrets.PRIVATE_KEYCLOAK_REALM }}
      PRIVATE_KEYCLOAK_BASE_URL: ${{ secrets.PRIVATE_KEYCLOAK_BASE_URL }}
      PRIVATE_KEYCLOAK_CLIENT_SECRET: ${{ secrets.PRIVATE_KEYCLOAK_CLIENT_SECRET }}
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      PRIVATE_KEYCLOAK_CLIENT_ID: ${{ secrets.PRIVATE_KEYCLOAK_CLIENT_ID }}
      PRIVATE_WALLET_API_KEY: ${{ secrets.PRIVATE_WALLET_API_KEY }}

    steps:
      - name: Checkout repository (PR head)
        if: github.event_name == 'pull_request_target'
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name }}

      - name: Checkout repository (default)
        if: github.event_name != 'pull_request_target'
        uses: actions/checkout@v4

      - name: Cache Yarn and WebDriver
        uses: actions/cache@v4
        with:
          path: |
            .yarn/cache
            .yarn/unplugged
            .yarn/.cache/webdriver
          key: yarn-webdriver-${{ runner.os }}-${{ hashFiles('yarn.lock', 'apps/bdd/wdio.web.conf.ts') }}
          restore-keys: |
            yarn-webdriver-${{ runner.os }}-

      - name: Use Node.js 20.x
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Start user service in the background
        run: |
          yarn user:dev &>/dev/null & npx wait-on tcp:8080 --timeout 30000
          yarn web:dev &>/dev/null & npx wait-on tcp:3000 --timeout 30000

      - name: Run full bdd test
        uses: cypress-io/github-action@v6
        with:
          command: yarn bdd:test:web:report

      - name: Deploy PR WebDriver report to GitHub Pages
        if: always() && github.event_name == 'pull_request_target'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apps/bdd/test-artifacts/reports/web/cucumber-html
          destination_dir: webdriver/web/pr-${{ github.event.pull_request.number }}
          keep_files: true

      - name: Deploy production WebDriver report to GitHub Pages
        if: always() && github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: apps/bdd/test-artifacts/reports/web/cucumber-html
          destination_dir: webdriver/web/prod
          keep_files: true

      - name: Pin report links on PR
        if: always() && github.event_name == 'pull_request_target'
        uses: actions/github-script@v7
        env:
          JOB_STATUS: ${{ job.status }}
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const prNumber = context.payload.pull_request.number;
            const base = `https://${owner}.github.io/${repo}/webdriver/web`;
            const prUrl = `${base}/pr-${prNumber}/index.html`;
            const prodUrl = `${base}/prod/index.html`;
            const marker = "<!-- webdriver-report-links -->";
            const body = `${marker}
            ## WebDriver Report Links
            - PR report (dev): ${prUrl}
            - Production report: ${prodUrl}
            - Workflow status: ${process.env.JOB_STATUS}`;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number: prNumber,
              per_page: 100,
            });

            const matches = comments.filter(c => c.body?.includes(marker));
            const [existing, ...duplicates] = matches.sort(
              (a, b) => new Date(b.created_at) - new Date(a.created_at),
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });

              for (const dup of duplicates) {
                await github.rest.issues.deleteComment({
                  owner,
                  repo,
                  comment_id: dup.id,
                });
              }
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number: prNumber,
                body,
              });
            }
